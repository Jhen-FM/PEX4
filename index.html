<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Controle de Estoque - Garagem</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🚗 Controle de Estoque da Garagem</h1>
    <p>Gerencie peças e insumos com facilidade</p>
  </header>

  <main>
    <section>
      <h2>Itens cadastrados</h2>
      <button onclick="loadItems()">Carregar Itens</button>
      <ul id="items"></ul>
    </section>

    <section>
      <h2>Estoque atual</h2>
      <button onclick="loadStock()">Carregar Estoque</button>
      <ul id="stock"></ul>
    </section>

    <section>
      <h2>Registrar movimentação</h2>
      <form id="movementForm">
        <input type="text" id="item" placeholder="Item" required>
        <input type="number" id="qty" placeholder="Quantidade" required>
        <select id="type" required>
          <option value="entrada">Entrada</option>
          <option value="saída">Saída</option>
        </select>
        <button type="submit">Registrar</button>
      </form>
      <div id="movementResult"></div>
    </section>
  </main>

  <script>
    async function loadItems() {
      const res = await fetch('/api/items');
      const data = await res.json();
      document.getElementById('items').innerHTML =
        data.map(i => `<li>${i.name}</li>`).join('');
    }

    async function loadStock() {
      const res = await fetch('/api/stock');
      const data = await res.json();
      document.getElementById('stock').innerHTML =
        data.map(s => `<li>${s.item}: ${s.qty}</li>`).join('');
    }

    document.getElementById('movementForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const body = {
        item: document.getElementById('item').value,
        qty: parseInt(document.getElementById('qty').value),
        type: document.getElementById('type').value
      };
      const res = await fetch('/api/movements', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      document.getElementById('movementResult').textContent = data.message || data.error;
      loadStock();
    });
  </script>
</body>
</html>
