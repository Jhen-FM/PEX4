<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Controle de Estoque - Garagem</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Cabeçalho -->
  <header>
    <h1>🚗 Controle de Estoque da Garagem</h1>
    <p>Gerencie peças e insumos com facilidade</p>
  </header>

  <!-- Conteúdo principal -->
  <main>
    <!-- Seção de Itens -->
    <section>
      <h2>Itens cadastrados</h2>
      <button onclick="loadItems()">Carregar Itens</button>
      <ul id="items"></ul>
    </section>

    <!-- Seção de Estoque -->
    <section>
      <h2>Estoque atual</h2>
      <button onclick="loadStock()">Carregar Estoque</button>
      <ul id="stock"></ul>
    </section>

    <!-- Seção de Movimentações -->
    <section>
      <h2>Registrar movimentação</h2>
      <form id="movementForm">
        <label for="item">Item:</label>
        <input type="text" id="item" name="item" placeholder="Ex: Óleo de motor" required>

        <label for="qty">Quantidade:</label>
        <input type="number" id="qty" name="qty" required>

        <label for="type">Tipo:</label>
        <select id="type" name="type" required>
          <option value="entrada">Entrada</option>
          <option value="saída">Saída</option>
        </select>

        <button type="submit">Registrar</button>
      </form>
      <div id="movementResult"></div>
    </section>
  </main>

  <!-- Rodapé -->
  <footer>
    <p>© 2026 Ateliê Garage - Todos os direitos reservados</p>
  </footer>

  <!-- Script para interagir com API -->
  <script>
    async function loadItems() {
      const res = await fetch('/api/items');
      const data = await res.json();
      document.getElementById('items').innerHTML =
        data.map(i => `<li><strong>${i.name}</strong></li>`).join('');
    }

    async function loadStock() {
      const res = await fetch('/api/stock');
      const data = await res.json();
      document.getElementById('stock').innerHTML =
        data.map(s => `<li>${s.item}: <strong>${s.qty}</strong> unidades</li>`).join('');
    }

    document.getElementById('movementForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const body = {
        item: document.getElementById('item').value,
        qty: parseInt(document.getElementById('qty').value),
        type: document.getElementById('type').value
      };
      const res = await fetch('/api/movements', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      document.getElementById('movementResult').textContent = data.message || data.error;
      loadStock(); // atualiza estoque após movimentação
    });
  </script>
</body>
</html>
